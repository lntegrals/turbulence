<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Live Turbulence Risk Estimator</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header id="top-bar" aria-live="polite">
      <div class="metric"><span>Aircraft</span><strong id="live-count">0</strong></div>
      <div class="metric"><span>Selected</span><strong id="selected-flight">None</strong></div>
      <div class="metric"><span>Mode</span><strong id="mode-pill">Heuristic v2</strong></div>
    </header>

    <main>
      <section id="map-wrap">
        <div id="map"></div>
        <div id="status-chip" role="status" aria-live="polite">
          <span id="status-text">Starting up…</span>
        </div>
      </section>

      <section id="leaderboard" class="collapsed" aria-label="Roughest flights leaderboard">
        <button id="leaderboard-toggle" class="ghost-btn">Roughest Flights Right Now</button>
        <ul id="leaderboard-list"></ul>
      </section>

      <aside id="sheet" class="open" aria-live="polite">
        <button id="sheet-handle" aria-label="Toggle flight details">Flight details</button>
        <div id="sheet-content"></div>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
